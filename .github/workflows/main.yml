name: TED Pure BigData Pipeline Engine

# =========================================================
# ⏱️ 1. 스케줄 타이머 설정 (30분 주기 자동 가동)
# =========================================================
on:
  schedule:
    # 30분마다 공장 가동 (예: 1시 0분, 1시 30분, 2시 0분...)
    - cron: '*/30 * * * *'
  
  # 필요할 때 깃허브 Actions 탭에서 버튼을 눌러 수동으로 즉시 가동할 수 있게 합니다.
  workflow_dispatch:

# =========================================================
# 💻 2. 가상 컴퓨터 작업 지시서 (Ubuntu 리눅스 환경 구동)
# =========================================================
jobs:
  execute-bigdata-scrapper:
    runs-on: ubuntu-latest

    steps:
    # ---------------------------------------------------------
    # 단계 1: 저장소에 올린 파이썬 소스코드를 가상 컴퓨터로 가져옵니다.
    # ---------------------------------------------------------
    - name: 📁 저장소 소스코드 체크아웃
      uses: actions/checkout@v3

    # ---------------------------------------------------------
    # 단계 2: 파이썬 실행 환경을 완벽하게 구축합니다.
    # ---------------------------------------------------------
    - name: 🐍 파이썬 3.10 버전 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ---------------------------------------------------------
    # 단계 3: 무한 스크롤 및 데이터 수집에 필요한 필수 파이썬 라이브러리 설치
    # ---------------------------------------------------------
    - name: 📦 필수 파이썬 라이브러리 일괄 설치
      run: |
        pip install selenium
        pip install beautifulsoup4
        pip install webdriver-manager
        pip install supabase

    # ---------------------------------------------------------
    # 단계 4: 리눅스 환경에서 셀레니움 봇을 띄울 진짜 구글 크롬 브라우저 다운로드
    # ---------------------------------------------------------
    - name: 🌐 우분투 시스템 최신 구글 크롬 브라우저 강제 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    # ---------------------------------------------------------
    # 단계 5: 모든 준비가 끝나면 무한 스크롤 엔진 스크립트를 실행합니다.
    # ---------------------------------------------------------
    - name: 🏭 TED 빅데이터 무한 스크롤 스크래핑 엔진 최종 가동
      run: python bigdata_engine.py
